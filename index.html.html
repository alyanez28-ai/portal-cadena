    input:focus{outline:none;border-color:#d4a843!important;}

<script type="text/babel">
const { useState, useEffect } = React;

// ══════════════════════════════════════
// CREDENCIALES SUPABASE
// ══════════════════════════════════════
const SB_URL = "https://rbdaahtmrhtfkjxzexan.supabase.co";
const SB_KEY = "sb_publishable_hdeihzpGyvrZBguRrBszfQ_iN9c09Hk";
const { createClient } = supabase;
const db = createClient(SB_URL, SB_KEY);

const C = {
  bg:"#0a0f1e", surface:"#111827", card:"#1a2236", border:"#1e2d45",
  gold:"#d4a843", blue:"#2563eb", green:"#10b981", red:"#ef4444",
  yellow:"#f59e0b", text:"#e2e8f0", muted:"#64748b", white:"#ffffff",
  purple:"#a855f7"
};

const fmt = n => "$" + (+n||0).toLocaleString("es-EC",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtDate = d => d ? new Date(d+"T00:00:00").toLocaleDateString("es-EC",{day:"2-digit",month:"long",year:"numeric"}) : "—";
const diasMora = fv => {
  if(!fv) return 0;
  const d = Math.floor((new Date()-new Date(fv+"T00:00:00"))/86400000);
  return d>0?d:0;
};

// ══════════════════════════════════════
// PANTALLA DE LOGIN DEL SOCIO
// ══════════════════════════════════════
function LoginSocio({onLogin}){
  const [cedula,setCedula]=useState("");
  const [clave,setClave]=useState("");
  const [error,setError]=useState("");
  const [loading,setLoading]=useState(false);
  const [showPass,setShowPass]=useState(false);
  const [modo,setModo]=useState("login"); // login | primer_ingreso | recuperar

  const entrar=async()=>{
    if(!cedula||!clave){setError("Ingresa tu cédula y clave.");return;}
    setLoading(true);setError("");
    try{
      // Buscar socio por cédula — extrae solo dígitos para comparar
      const cedulaBuscar = cedula.trim();
      const soloDigitos = cedulaBuscar.replace(/[^0-9]/g,"");
      let socio = null;
      // Intento 1: exacto
      const {data:s1} = await db.from("socios").select("*").eq("cedula",cedulaBuscar).eq("activo",true).maybeSingle();
      if(s1) socio=s1;
      // Intento 2: con guión (0-XXXXXXXXX)
      if(!socio&&soloDigitos.startsWith("0")){
        const conGuion="0-"+soloDigitos.substring(1);
        const {data:s2} = await db.from("socios").select("*").eq("cedula",conGuion).eq("activo",true).maybeSingle();
        if(s2) socio=s2;
      }
      // Intento 3: sin guión
      if(!socio){
        const {data:s3} = await db.from("socios").select("*").eq("cedula",soloDigitos).eq("activo",true).maybeSingle();
        if(s3) socio=s3;
      }
      // Intento 4: busqueda parcial por los últimos 9 dígitos
      if(!socio&&soloDigitos.length>=9){
        const ultimos=soloDigitos.slice(-9);
        const {data:s4} = await db.from("socios").select("*").ilike("cedula",`%${ultimos}`).eq("activo",true).maybeSingle();
        if(s4) socio=s4;
      }
      if(!socio){setError("Cédula no encontrada. Consulta con tu asesor de CADENA.");setLoading(false);return;}

      // Verificar clave del socio
      const {data:acc,error:e2}=await db.from("accesos_socios").select("*").eq("socio_id",socio.id).single();

      if(e2||!acc){
        // Primer ingreso — verificar con fecha de nacimiento o cédula
        setModo("primer_ingreso");
        setLoading(false);return;
      }

      if(acc.clave!==clave){setError("Clave incorrecta. Inténtalo de nuevo.");setLoading(false);return;}

      onLogin(socio);
    }catch(e){setError("Error de conexión.");}
    setLoading(false);
  };

  const primerIngreso=async()=>{
    if(!cedula||!clave){setError("Completa todos los campos.");return;}
    if(clave.length<6){setError("La clave debe tener mínimo 6 caracteres.");return;}
    setLoading(true);setError("");
    try{
      const {data:socio}=await db.from("socios").select("*").eq("cedula",cedula.trim()).eq("activo",true).single();
      if(!socio){setError("Cédula no encontrada.");setLoading(false);return;}

      // Crear acceso del socio
      await db.from("accesos_socios").upsert([{
        socio_id:socio.id,
        cedula:cedula.trim(),
        clave:clave,
        primer_login:false,
        created_at:new Date().toISOString()
      }],{onConflict:"socio_id"});

      onLogin(socio);
    }catch(e){setError("Error al crear clave.");}
    setLoading(false);
  };

  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20,position:"relative",overflow:"hidden"}}>
      {/* Fondo decorativo */}
      <div style={{position:"absolute",inset:0,pointerEvents:"none"}}>
        <div style={{position:"absolute",top:-100,right:-100,width:400,height:400,borderRadius:"50%",background:"radial-gradient(circle,rgba(212,168,67,0.07) 0%,transparent 70%)"}}/>
        <div style={{position:"absolute",bottom:-80,left:-80,width:300,height:300,borderRadius:"50%",background:"radial-gradient(circle,rgba(16,185,129,0.06) 0%,transparent 70%)"}}/>
      </div>

      <div style={{width:"100%",maxWidth:400,position:"relative",zIndex:1}} className="fade">
        {/* Logo */}
        <div style={{textAlign:"center",marginBottom:32}}>

                ← Ya tengo clave

            </>

// PORTAL DEL SOCIO
// ══════════════════════════════════════
function PortalSocio({socio,onSalir}){
  const [planPagos,setPlanPagos]=useState([]);
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState("resumen");
  const m=diasMora(socio.fecha_vence);
  const intMora=m>0?(socio.saldo_credito*0.0003*m).toFixed(2):"0.00";
  const intAhorro=(socio.saldo_ahorro*0.005).toFixed(2);
  const hoy=new Date().toLocaleDateString("es-EC",{day:"2-digit",month:"long",year:"numeric"});

  useEffect(()=>{
    (async()=>{
      if(socio.saldo_credito>0){
        const {data}=await db.from("plan_pagos").select("*").eq("socio_id",socio.id).order("num_cuota");
        setPlanPagos(data||[]);
      }
      setLoading(false);
    })();
  },[socio]);

  const msgWsp=encodeURIComponent(`🏦 *CAJA DE AHORRO CADENA*
━━━━━━━━━━━━━━━━━━━━
Estado de Cuenta — ${hoy}
👤 *Socio:* ${socio.nombre}
🪪 *Cédula:* ${socio.cedula}

💰 *AHORROS*
Saldo Total: ${fmt(socio.saldo_ahorro)}
Interés acumulado: +$${intAhorro}

${socio.saldo_credito>0?`💳 *CRÉDITO ACTIVO*
Saldo Capital: ${fmt(socio.saldo_credito)}
Cuota mensual: ${fmt(socio.cuota_mensual)}
${socio.fecha_vence?`Próximo vence: ${fmtDate(socio.fecha_vence)}`:""}
${m>0?`⚠️ MORA: ${m} días — Int. mora: $${intMora}`:"✅ Al día"}`:"✅ Sin crédito activo"}

          <button onClick={onSalir} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,borderRadius:7,padding:"5px 10px",fontSize:11,cursor:"pointer"}}>Salir 🚪</button>
        </div>
      </div>

      {/* NAV */}
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"0 20px",display:"flex",gap:2,overflowX:"auto"}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{background:"transparent",border:"none",color:tab===t.id?C.gold:C.muted,padding:"13px 14px",fontSize:12,fontWeight:tab===t.id?700:500,cursor:"pointer",borderBottom:`2px solid ${tab===t.id?C.gold:"transparent"}`,whiteSpace:"nowrap"}}>
            {t.icon} {t.label}
          </button>
        ))}
      </div>

      {/* CONTENT */}
      <div style={{padding:"20px 16px",maxWidth:700,margin:"0 auto"}}>

        {/* RESUMEN */}
        {tab==="resumen"&&(
          <div className="fade">
            <h2 style={{color:C.white,fontSize:18,fontWeight:800,marginBottom:4}}>Hola, {(()=>{const p=socio.nombre.trim().split(/\s+/);return p.length>=3?p[2]+" "+p[0]:p[0];})()+" 👋"}</h2>
            <p style={{color:C.muted,fontSize:13,marginBottom:20}}>Corte al {hoy}</p>

            {/* Alerta mora */}
            {m>0&&(
              <div style={{background:"#2d0a0a",border:"2px solid #7f1d1d",borderRadius:12,padding:16,marginBottom:16,display:"flex",gap:12,alignItems:"center"}}>
                <span style={{fontSize:28}}>⚠️</span>
                <div>
                  <div style={{color:C.red,fontSize:14,fontWeight:700}}>Tienes {m} días de mora</div>
                  <div style={{color:"#f87171",fontSize:12,marginTop:2}}>Interés de mora acumulado: ${intMora}</div>
                  <div style={{color:"#f87171",fontSize:12}}>Por favor regulariza tu pago lo antes posible.</div>
                </div>
              </div>
            )}

            {/* Tarjetas */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:20}}>
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:20,borderLeft:`4px solid ${C.green}`}}>
                <div style={{color:C.muted,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>💰 Mis Ahorros</div>
                <div style={{color:C.green,fontSize:26,fontWeight:800,fontFamily:"'DM Mono',monospace"}}>{fmt(socio.saldo_ahorro)}</div>
                <div style={{color:C.muted,fontSize:11,marginTop:6}}>Interés generado: +${intAhorro}</div>
              </div>
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:20,borderLeft:`4px solid ${m>0?C.red:C.blue}`}}>
                <div style={{color:C.muted,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>💳 Mi Crédito</div>
                <div style={{color:socio.saldo_credito>0?(m>0?C.red:C.blue):C.muted,fontSize:26,fontWeight:800,fontFamily:"'DM Mono',monospace"}}>
                  {socio.saldo_credito>0?fmt(socio.saldo_credito):"Sin crédito"}
                </div>
                {socio.saldo_credito>0&&<div style={{color:C.muted,fontSize:11,marginTop:6}}>Cuota: {fmt(socio.cuota_mensual)}/mes</div>}
              </div>
            </div>

            {/* Próximo pago */}
            {socio.saldo_credito>0&&(
              <div style={{background:m>0?"#2d0a0a":"#052e16",border:`1px solid ${m>0?"#7f1d1d":"#14532d"}`,borderRadius:12,padding:16,marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{color:m>0?C.red:C.green,fontSize:13,fontWeight:700}}>
                    {m>0?"⚠️ Cuota vencida":"✅ Próximo pago"}
                  </div>
                  <div style={{color:C.muted,fontSize:12,marginTop:2}}>{fmtDate(socio.fecha_vence)}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{color:m>0?C.red:C.green,fontSize:20,fontWeight:800,fontFamily:"'DM Mono',monospace"}}>{fmt(socio.cuota_mensual)}</div>
                  {m>0&&<div style={{color:"#f87171",fontSize:11,marginTop:2}}>{m} días de retraso</div>}
                </div>
              </div>
            )}

            {/* Info socio */}
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:16}}>
              <div style={{color:C.muted,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:12}}>📋 Mis Datos</div>
              <div style={{display:"grid",gap:8}}>
                {[["Nombre completo",socio.nombre],["Cédula",socio.cedula],["Teléfono",socio.telefono||"No registrado"],["Código de socio",socio.codigo]].map(([lbl,val])=>(
                  <div key={lbl} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
                    <span style={{color:C.muted,fontSize:12}}>{lbl}</span>
                    <span style={{color:C.white,fontSize:13,fontWeight:600,fontFamily:lbl==="Cédula"||lbl==="Código de socio"?"'DM Mono',monospace":"inherit"}}>{val}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* CRÉDITO */}
        {tab==="credito"&&(
          <div className="fade">
            <h2 style={{color:C.white,fontSize:18,fontWeight:800,marginBottom:4}}>Mi Crédito</h2>
            <p style={{color:C.muted,fontSize:13,marginBottom:20}}>Detalle de tu préstamo activo</p>

            {socio.saldo_credito===0
              ?<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:40,textAlign:"center"}}>
                <div style={{fontSize:40,marginBottom:12}}>✅</div>
                <div style={{color:C.white,fontSize:16,fontWeight:700,marginBottom:6}}>Sin crédito activo</div>
                <div style={{color:C.muted,fontSize:13}}>No tienes préstamos pendientes actualmente.</div>
              </div>
              :<div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
                  {[
                    ["Saldo pendiente",fmt(socio.saldo_credito),m>0?C.red:C.blue],
                    ["Cuota mensual",fmt(socio.cuota_mensual),C.gold],
                    ["Próx. vencimiento",fmtDate(socio.fecha_vence),m>0?C.red:C.muted],
                    ["Estado",m>0?`${m} días mora`:"Al día",m>0?C.red:C.green],
                  ].map(([lbl,val,col])=>(
                    <div key={lbl} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:14}}>
                      <div style={{color:C.muted,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>{lbl}</div>
                      <div style={{color:col,fontSize:16,fontWeight:800,fontFamily:"'DM Mono',monospace"}}>{val}</div>
                    </div>
                  ))}
                </div>

                {/* Tabla de amortización */}
                {planPagos.length>0&&(
                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden"}}>
                    <div style={{padding:"12px 16px",background:"#0d1a2e",borderBottom:`1px solid ${C.border}`}}>
                      <span style={{color:C.white,fontSize:13,fontWeight:700}}>📅 Mi tabla de pagos</span>
                    </div>
                    <div style={{overflowX:"auto"}}>
                      <table style={{width:"100%",borderCollapse:"collapse"}}>
                        <thead><tr style={{background:"#0d1a2e"}}>
                          {["#","Fecha","Cuota","Capital","Interés","Saldo","Estado"].map(h=>
                            <th key={h} style={{padding:"9px 12px",textAlign:"right",color:C.muted,fontSize:10,fontWeight:700,textTransform:"uppercase",borderBottom:`1px solid ${C.border}`}}>{h}</th>
                          )}
                        </tr></thead>
                        <tbody>
                          {planPagos.map((p,i)=>(
                            <tr key={p.id} style={{borderBottom:`1px solid ${C.border}`,background:p.estado==="pagado"?"#052e16":p.estado==="mora"?"#2d0a0a":i%2===0?"transparent":"#0f1a2d"}}>
                              <td style={{padding:"8px 12px",color:C.muted,fontSize:12,textAlign:"right"}}>{p.num_cuota}</td>
                              <td style={{padding:"8px 12px",color:C.muted,fontSize:11,textAlign:"right",whiteSpace:"nowrap"}}>{fmtDate(p.fecha_vence)}</td>
                              <td style={{padding:"8px 12px",color:C.gold,fontSize:12,fontFamily:"'DM Mono',monospace",fontWeight:700,textAlign:"right"}}>{fmt(p.monto_cuota)}</td>
                              <td style={{padding:"8px 12px",color:C.blue,fontSize:12,fontFamily:"'DM Mono',monospace",textAlign:"right"}}>{fmt(p.capital)}</td>
                              <td style={{padding:"8px 12px",color:C.red,fontSize:12,fontFamily:"'DM Mono',monospace",textAlign:"right"}}>{fmt(p.interes)}</td>
                              <td style={{padding:"8px 12px",color:C.white,fontSize:12,fontFamily:"'DM Mono',monospace",textAlign:"right"}}>{fmt(p.saldo)}</td>
                              <td style={{padding:"8px 12px",textAlign:"right"}}>
                                {p.estado==="pagado"?<span style={{color:C.green,fontSize:12}}>✅</span>:p.estado==="mora"?<span style={{color:C.red,fontSize:12}}>⚠️</span>:<span style={{color:C.muted,fontSize:12}}>⏳</span>}
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}

                {planPagos.length===0&&(
                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:20,textAlign:"center",color:C.muted,fontSize:13}}>
                    Tu tabla de pagos será visible una vez que tu asesor la registre en el sistema.
                  </div>
                )}
              </div>
            }
          </div>
        )}

        {/* ESTADO DE CUENTA */}
        {tab==="estado"&&(
          <div className="fade">
            <h2 style={{color:C.white,fontSize:18,fontWeight:800,marginBottom:4}}>Estado de Cuenta</h2>
            <p style={{color:C.muted,fontSize:13,marginBottom:20}}>Tu resumen al {hoy}</p>

            {/* Vista previa */}
            <div style={{background:"#0a1a0f",border:"1px solid #14532d",borderRadius:14,padding:20,marginBottom:16}}>
              <div style={{color:C.green,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:12}}>📱 Vista previa del mensaje</div>
              <div style={{background:"#1a3a2a",borderRadius:"4px 14px 14px 14px",padding:"14px 16px",maxWidth:"90%"}}>
                <pre style={{color:"#e9ffef",fontSize:11,lineHeight:1.9,whiteSpace:"pre-wrap",fontFamily:"'DM Mono',monospace",margin:0}}>{`🏦 CAJA DE AHORRO CADENA
━━━━━━━━━━━━━━━━━━━━
Estado de Cuenta — ${hoy}
👤 Socio: ${socio.nombre}
🪪 Cédula: ${socio.cedula}

💰 AHORROS
Saldo Total: ${fmt(socio.saldo_ahorro)}
Interés acumulado: +$${intAhorro}

${socio.saldo_credito>0?`💳 CRÉDITO ACTIVO
Saldo Capital: ${fmt(socio.saldo_credito)}
Cuota mensual: ${fmt(socio.cuota_mensual)}
Próximo vence: ${fmtDate(socio.fecha_vence)}
${m>0?`⚠️ MORA: ${m} días — Int. mora: $${intMora}`:"✅ Al día"}`:"✅ Sin crédito activo"}

━━━━━━━━━━━━━━━━━━━━
Tu ahorro es tu futuro.
Gracias por confiar en CADENA 🤝`}</pre>
                <div style={{color:"#6b9b7a",fontSize:9,marginTop:8,textAlign:"right"}}>{new Date().toLocaleTimeString("es-EC",{hour:"2-digit",minute:"2-digit"})} ✓✓</div>
              </div>
            </div>

            {/* Botones */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <a href={`https://wa.me/?text=${msgWsp}`} target="_blank" rel="noopener noreferrer"
                style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:"#128C7E",color:"#fff",borderRadius:12,padding:"14px",fontWeight:700,fontSize:14,textDecoration:"none",boxShadow:"0 4px 14px rgba(18,140,126,0.35)"}}>
                📱 Guardar en WhatsApp
              </a>
              <button onClick={()=>navigator.clipboard.writeText(decodeURIComponent(msgWsp)).then(()=>alert("✅ Copiado al portapapeles"))}
                style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:C.card,color:C.text,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px",fontWeight:700,fontSize:14,cursor:"pointer"}}>
                📋 Copiar texto
              </button>
            </div>

            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:14,marginTop:14}}>
              <div style={{color:C.muted,fontSize:11,lineHeight:1.7}}>
                💡 <strong style={{color:C.white}}>¿Tienes preguntas?</strong> Contacta a tu asesor de CADENA para cualquier consulta sobre tu cuenta, pagos o solicitud de crédito.
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ══════════════════════════════════════
// APP PRINCIPAL
// ══════════════════════════════════════
function App(){
  const [socio,setSocio]=useState(null);

  // Crear tabla accesos_socios si no existe
  useEffect(()=>{
    db.from("accesos_socios").select("id").limit(1).then(({error})=>{
      if(error&&error.code==="42P01"){
        // La tabla no existe, crearla via SQL
        console.log("Tabla accesos_socios no existe");
      }
    });
  },[]);

  if(!socio) return <LoginSocio onLogin={s=>setSocio(s)}/>;
  return <PortalSocio socio={socio} onSalir={()=>setSocio(null)}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
